<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Translator Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="translator-container">
        <h2>Language Translator</h2>
        
        <div class="controls">
            <select id="source-lang">
                <option value="auto">Auto-Detect</option>
                <option value="en">English</option>
                <option value="es">Spanish</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="hi">Hindi</option>
            </select>

            <span class="arrow">➔</span>

            <select id="target-lang">
                <option value="es" selected>Spanish</option>
                <option value="en">English</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="hi">Hindi</option>
            </select>
        </div>

        <div class="text-areas">
            <textarea id="input-text" placeholder="Type text to translate..."></textarea>
            <textarea id="output-text" placeholder="Translation will appear here..." readonly></textarea>
        </div>

        <div class="buttons-container">
            <button id="translate-btn">Translate</button>
            <button id="copy-btn" class="secondary-btn">Copy</button>
            <button id="speak-btn" class="secondary-btn">🔊 Listen</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
